name: Python application

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Test on Python ${{ matrix.python-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14', '3.14t']
        os: [ubuntu-latest, windows-latest, macOS-latest]
      fail-fast: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group test --python ${{ matrix.python-version }}
      - name: Lint
        run: uv run --group test --python ${{ matrix.python-version }} ruff check
      - name: Run tests
        run: uv run --group test --python ${{ matrix.python-version }} pytest --cov=excitertools --cov-report=lcov:coverage.lcov excitertools tests/
      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
          flag-name: py-${{ matrix.python-version }}
          parallel: true

  finish-coverage:
    name: Finalize Coveralls
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
